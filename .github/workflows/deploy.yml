name: Deploy

on:
  push:
    branches: [main]

# CRITICAL: id-token:write lets the runner request an OIDC token from GitHub.
# Without this, configure-aws-credentials cannot exchange it for AWS credentials.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::084375583552:role/lambda-agent-github-actions
          aws-region: us-east-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3

      - name: Build Lambda package
        run: |
          rm -rf lambda_package
          mkdir -p lambda_package/agent
          pip install \
            -r agent/requirements.txt \
            -t lambda_package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: -q
          cp agent/__init__.py lambda_package/agent/
          cp agent/agent.py    lambda_package/agent/
          cp agent/handler.py  lambda_package/agent/
          cp agent/secrets.py  lambda_package/agent/

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
